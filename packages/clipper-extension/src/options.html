<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Synaipse Clipper Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup">
        <header>
            <h1>Synaipse · Settings</h1>
        </header>

        <label class="field">
            <span>Server URL</span>
            <input id="server-url" type="text" placeholder="http://localhost:3001" />
        </label>

        <button id="save" class="primary">Save</button>
        <p id="result" class="result"></p>
    </div>
    <script src="options.js" type="module"></script>
</body>
</html>
