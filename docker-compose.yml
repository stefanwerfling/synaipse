services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: synaipse-qdrant
    profiles: [voyage, ollama]
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

  ollama:
    image: ollama/ollama:latest
    container_name: synaipse-ollama
    profiles: [ollama]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: synaipse-ollama-init
    profiles: [ollama]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    # Pulls the embedder only — chat model is now provider-agnostic and may
    # live elsewhere (openai/anthropic/claude-shell). Pull a chat model
    # manually with `docker exec synaipse-ollama ollama pull <model>` if you
    # want Ollama for chat too.
    entrypoint: ["sh", "-c", "sleep 10 && ollama pull ${OLLAMA_MODEL:-nomic-embed-text} && echo 'embedder ready'"]
    restart: "no"

  # MariaDB hot-tier for SYNAIPSE_MODE=server. 11.7+ ships native VECTOR
  # support — we don't use it yet (vectors stay in Qdrant for now) but
  # pinning here keeps the migration path open.
  mariadb:
    image: mariadb:11.7
    container_name: synaipse-mariadb
    profiles: [server]
    restart: unless-stopped
    ports:
      # Default 3307 — most dev hosts already have a MariaDB/MySQL on 3306.
      # Override with SYNAIPSE_MARIADB_PORT if you want the canonical port.
      - "${SYNAIPSE_MARIADB_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${SYNAIPSE_MARIADB_ROOT_PASSWORD:-synaipse-root}
      MARIADB_DATABASE: ${SYNAIPSE_MARIADB_DATABASE:-synaipse}
      MARIADB_USER: ${SYNAIPSE_MARIADB_USER:-synaipse}
      MARIADB_PASSWORD: ${SYNAIPSE_MARIADB_PASSWORD:-synaipse}
    volumes:
      - ./data/mariadb:/var/lib/mysql
      - ./packages/server-storage/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 6

  # All-in-one Synaipse app: Web API on 3001, built static frontend
  # served from the same port, MCP HTTP transport mounted at /mcp.
  # Image is built from the repo root Dockerfile.
  synaipse-web:
    image: synaipse:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synaipse-web
    profiles: [server]
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${SYNAIPSE_WEB_PORT:-3001}:3001"
    environment:
      SYNAIPSE_MODE: server
      # Vault path must exist but isn't used for note IO in server-mode —
      # /tmp/vault avoids accidentally writing to a real vault.
      SYNAIPSE_VAULT_PATH: /tmp/vault
      SYNAIPSE_INDEX_CACHE: /tmp/vault/.synaipse-index.json
      # Talk to the sibling MariaDB by service name, not 127.0.0.1.
      SYNAIPSE_MARIADB_HOST: mariadb
      SYNAIPSE_MARIADB_PORT: 3306
      SYNAIPSE_MARIADB_USER: ${SYNAIPSE_MARIADB_USER:-synaipse}
      SYNAIPSE_MARIADB_PASSWORD: ${SYNAIPSE_MARIADB_PASSWORD:-synaipse}
      SYNAIPSE_MARIADB_DATABASE: ${SYNAIPSE_MARIADB_DATABASE:-synaipse}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-none}
      WEB_API_PORT: 3001
      MCP_SERVER_NAME: synaipse
      MCP_SERVER_VERSION: 0.1.0
      # Optional bearer for hybrid mode-local fallback. With mode=server
      # the users table is authoritative — populate it via the user CLI:
      #   docker compose run --rm synaipse-user create --label=admin --read --write
      SYNAIPSE_MCP_TOKEN: ${SYNAIPSE_MCP_TOKEN:-}
    command: ["node", "--enable-source-maps", "packages/web/dist/server/index.js"]

  # One-shot helper for `npm run user` inside the compose network. Invoke
  # with `docker compose run --rm synaipse-user create --label=foo --read --write`.
  # Profile=server-tools so it doesn't auto-start with `up`.
  synaipse-user:
    image: synaipse:dev
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [server]
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SYNAIPSE_MODE: server
      SYNAIPSE_VAULT_PATH: /tmp/vault
      SYNAIPSE_INDEX_CACHE: /tmp/vault/.synaipse-index.json
      SYNAIPSE_MARIADB_HOST: mariadb
      SYNAIPSE_MARIADB_PORT: 3306
      SYNAIPSE_MARIADB_USER: ${SYNAIPSE_MARIADB_USER:-synaipse}
      SYNAIPSE_MARIADB_PASSWORD: ${SYNAIPSE_MARIADB_PASSWORD:-synaipse}
      SYNAIPSE_MARIADB_DATABASE: ${SYNAIPSE_MARIADB_DATABASE:-synaipse}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-none}
    entrypoint: ["node", "--enable-source-maps", "packages/mcp-server/dist/UserCli.js"]
    command: []