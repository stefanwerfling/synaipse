services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: synaipse-qdrant
    profiles: [voyage, ollama]
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

  ollama:
    image: ollama/ollama:latest
    container_name: synaipse-ollama
    profiles: [ollama]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: synaipse-ollama-init
    profiles: [ollama]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "sleep 10 && ollama pull ${OLLAMA_MODEL:-nomic-embed-text} && ollama pull ${SYNAIPSE_CHAT_MODEL:-gemma3:4b} && echo 'models ready'"]
    restart: "no"