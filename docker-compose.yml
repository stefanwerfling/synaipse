services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: synaipse-qdrant
    profiles: [voyage, ollama]
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

  ollama:
    image: ollama/ollama:latest
    container_name: synaipse-ollama
    profiles: [ollama]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: synaipse-ollama-init
    profiles: [ollama]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    # Pulls the embedder only — chat model is now provider-agnostic and may
    # live elsewhere (openai/anthropic/claude-shell). Pull a chat model
    # manually with `docker exec synaipse-ollama ollama pull <model>` if you
    # want Ollama for chat too.
    entrypoint: ["sh", "-c", "sleep 10 && ollama pull ${OLLAMA_MODEL:-nomic-embed-text} && echo 'embedder ready'"]
    restart: "no"

  # MariaDB hot-tier for SYNAIPSE_MODE=server. 11.7+ ships native VECTOR
  # support — we don't use it yet (vectors stay in Qdrant for now) but
  # pinning here keeps the migration path open.
  mariadb:
    image: mariadb:11.7
    container_name: synaipse-mariadb
    profiles: [server]
    restart: unless-stopped
    ports:
      # Default 3307 — most dev hosts already have a MariaDB/MySQL on 3306.
      # Override with SYNAIPSE_MARIADB_PORT if you want the canonical port.
      - "${SYNAIPSE_MARIADB_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${SYNAIPSE_MARIADB_ROOT_PASSWORD:-synaipse-root}
      MARIADB_DATABASE: ${SYNAIPSE_MARIADB_DATABASE:-synaipse}
      MARIADB_USER: ${SYNAIPSE_MARIADB_USER:-synaipse}
      MARIADB_PASSWORD: ${SYNAIPSE_MARIADB_PASSWORD:-synaipse}
    volumes:
      - ./data/mariadb:/var/lib/mysql
      - ./packages/server-storage/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 6